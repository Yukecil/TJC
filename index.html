<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XY统计器">
<meta name="theme-color" content="#1a0a1e">
<title>XY专属统计器 · 数字生肖统计</title>
<style>
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:radial-gradient(circle at 20% 20%,#2d1b2e,#1a0a1e);min-height:100vh;min-height:-webkit-fill-available;display:flex;justify-content:center;align-items:center;overflow-x:hidden;overflow-y:auto;position:relative;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
*{touch-action:manipulation}

.splash-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 30%,#3d1b3e,#1a0a1e);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.6s ease;overflow:hidden;}
.splash-screen.hide{opacity:0;pointer-events:none;}
.splash-text{font-size:3rem;font-weight:900;letter-spacing:12px;background:linear-gradient(135deg,#ffb7c5,#ff69b4,#ff85a2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,105,180,0.8));z-index:2;animation:splashFloat 2s ease-in-out infinite;}
.splash-hint{position:absolute;bottom:80px;color:rgba(255,255,255,0.5);font-size:0.9rem;z-index:2;animation:splashHint 2s ease-in-out infinite;}

.splash-petal{position:absolute;top:-20px;z-index:1;pointer-events:none;animation:petalFall linear infinite;}
.splash-petal::before{content:'';display:block;width:12px;height:8px;background:rgba(255,183,197,0.8);border-radius:50% 0 50% 0;}

@keyframes splashFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes splashHint{0%,100%{opacity:0.3;}50%{opacity:0.8;}}
@keyframes petalFall{
    0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:1;}
    100%{transform:translateY(105vh) rotate(720deg) translateX(80px);opacity:0.2;}
}

.container{position:relative;z-index:10;width:100%;max-width:650px;display:flex;flex-direction:column;align-items:center;background:rgba(30,15,30,0.7);border-radius:36px;padding:24px 20px 28px;box-shadow:0 25px 50px -8px rgba(0,0,0,0.6),inset 0 0 0 1px rgba(255,182,193,0.2);border:1px solid rgba(255,182,193,0.3);color:#f0f0ff;margin:12px;}
h1{text-align:center;margin:0 auto 22px auto;font-size:2rem;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,#ffb7c5,#ff69b4,#ff85a2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(255,105,180,0.6));}
textarea,select{width:90%;max-width:500px;margin:8px auto 16px auto;border-radius:24px;padding:16px;font-size:16px;outline:none;background:rgba(20,10,20,0.6);color:#fff;border:1px solid rgba(255,182,193,0.3);-webkit-appearance:none;}
textarea{resize:vertical;min-height:80px;}
select{padding-right:36px;}
.button-panel{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%;margin-bottom:18px;}
button{flex:1 1 auto;min-width:80px;padding:14px 16px;border-radius:30px;border:1px solid rgba(255,255,255,0.3);background:linear-gradient(135deg,#ffb7c5,#ff85a2);color:#fff;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 6px 14px rgba(255,105,180,0.3);-webkit-tap-highlight-color:transparent;}
button:active{transform:scale(0.95);}
button.copy-btn{background:linear-gradient(135deg,#a0c4ff,#80b4ff);}
button.history-btn{background:linear-gradient(135deg,#c4a0ff,#b480ff);}
.result-title{text-align:center;font-size:1.1rem;margin:12px 0 8px;color:#ffb7c5;font-weight:500;}
#resultWrapper{width:100%;overflow-x:auto;border-radius:20px;background:rgba(0,0,0,0.3);max-height:400px;overflow-y:auto;border:1px solid rgba(255,182,193,0.2);}
.stats-group{margin:8px;border-radius:12px;overflow:hidden;}
.stats-group.max-group .group-header{background:linear-gradient(135deg,rgba(255,30,30,0.6),rgba(255,60,60,0.3));border-bottom:2px solid #ff2222;}
.stats-group.min-group .group-header{background:linear-gradient(135deg,rgba(255,100,40,0.5),rgba(255,120,50,0.2));border-bottom:2px solid #ff5533;}
.group-header{padding:8px 16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(255,105,180,0.4),rgba(255,133,162,0.2));}
.group-items{display:flex;flex-wrap:wrap;gap:6px;padding:10px;}
.item-badge{background:rgba(255,182,193,0.2);padding:6px 14px;border-radius:16px;font-weight:600;font-size:15px;color:#fff;border:1px solid rgba(255,182,193,0.4);}
.item-badge.max-item{background:rgba(255,30,30,0.45);border-color:#ff3333;color:#ffcccc;box-shadow:0 0 10px rgba(255,30,30,0.4);}
.item-badge.min-item{background:rgba(255,80,40,0.4);border-color:#ff5533;color:#ffccbb;box-shadow:0 0 10px rgba(255,80,40,0.35);}
.no-data{text-align:center;color:#aaa;padding:20px;}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:rgba(30,15,30,0.95);border-radius:24px;padding:20px;width:90%;max-width:600px;max-height:70vh;overflow-y:auto;border:1px solid rgba(255,182,193,0.3);color:#fff;}
.modal-title{font-size:1.2rem;font-weight:700;text-align:center;color:#ffb7c5;margin-bottom:16px;}
.history-item{background:rgba(255,255,255,0.05);border-radius:16px;padding:12px;margin-bottom:12px;border:1px solid rgba(255,182,193,0.15);position:relative;}
.history-time{font-size:0.75rem;color:#aaa;margin-bottom:6px;padding-right:60px;}
.history-input{font-size:0.8rem;color:#ffb7c5;margin-bottom:8px;word-break:break-all;padding-right:60px;}
.history-copy-btn{position:absolute;top:12px;right:12px;padding:6px 12px;border-radius:16px;background:rgba(160,196,255,0.3);border:1px solid rgba(160,196,255,0.4);color:#a0c4ff;font-size:0.7rem;cursor:pointer;white-space:nowrap;}
.history-copy-btn:active{background:rgba(160,196,255,0.5);}
.history-item .stats-group{margin:4px 0;}
.history-item .group-header{font-size:0.8rem;padding:4px 12px;}
.history-item .item-badge{font-size:0.75rem;padding:3px 10px;}
.history-empty{text-align:center;color:#aaa;padding:30px;}

.toast-message{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(255,105,180,0.9);color:#fff;padding:14px 32px;border-radius:30px;font-size:16px;font-weight:600;z-index:9999;box-shadow:0 10px 30px rgba(255,105,180,0.5);animation:toastIn 0.4s ease,toastOut 0.4s ease 2.5s forwards;pointer-events:none;max-width:85%;text-align:center;white-space:nowrap;}
.toast-message.error{background:rgba(200,60,80,0.9);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(30px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(20px)}}
</style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
<div class="splash-text">hi 你好</div>
<div class="splash-hint">点击任意位置开始</div>
</div>

<div class="container">
<h1>🌸 XY 专属统计器 🌸</h1>
<textarea id="inputData" placeholder="请选择统计类型" rows="4"></textarea>
<select id="modeSelect">
<option value="digitSplit">头尾统计</option>
<option value="digitWhole">号码统计</option>
<option value="shengxiao">生肖统计</option>
</select>
<div class="button-panel">
<button id="runBtn">🌸 开始统计</button>
<button id="clearCurrentBtn">❌ 清除统计</button>
<button id="copyBtn" class="copy-btn">📋 复制结果</button>
<button id="historyBtn" class="history-btn">📜 历史记录</button>
</div>
<div class="result-title">📊 统计结果</div>
<div id="resultWrapper"><div id="result" style="padding:8px;text-align:center;color:#aaa;">暂无数据</div></div>
</div>

<div class="modal-overlay" id="historyModal">
<div class="modal-box">
<div class="modal-title">📜 历史记录</div>
<div id="historyList"><div class="history-empty">暂无历史记录</div></div>
<button id="clearHistoryBtn" style="width:100%;margin-top:12px;background:linear-gradient(135deg,rgba(200,60,80,0.6),rgba(200,80,60,0.4));">🗑️ 清空历史</button>
</div>
</div>

<script>
(function(){
    var currentGrouped=null, currentMax=null, currentMin=null, currentInput="", currentMode="";
    var historyData=[];
    var HISTORY_KEY='xy_stats_history_v10';

    function loadHistory(){
        try{historyData=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){historyData=[];}
    }
    function saveHistory(){
        try{localStorage.setItem(HISTORY_KEY,JSON.stringify(historyData));}catch(e){}
    }

    // ===== 开屏花瓣飘落 =====
    (function(){
        var splash=document.getElementById("splashScreen");
        var totalPetals=35;
        for(var i=0;i<totalPetals;i++){
            var petal=document.createElement("div");
            petal.className="splash-petal";
            var leftPos=Math.random()*95;
            petal.style.left=leftPos+"%";
            var size=6+Math.random()*10;
            petal.style.width=size+"px";
            petal.style.height=(size*0.6)+"px";
            petal.style.animationDuration=(5+Math.random()*8)+"s";
            petal.style.animationDelay=Math.random()*8+"s";
            petal.style.opacity=0.3+Math.random()*0.7;
            splash.appendChild(petal);
        }
    })();

    // ===== biu 提示音 =====
    var audioCtx=null;
    function playBiu(){
        try{
            if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
            var o=audioCtx.createOscillator();
            var g=audioCtx.createGain();
            o.connect(g);g.connect(audioCtx.destination);
            o.type='sine';
            o.frequency.setValueAtTime(1200,audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(600,audioCtx.currentTime+0.12);
            g.gain.setValueAtTime(0.3,audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);
            o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.15);
        }catch(e){}
    }

    document.getElementById("splashScreen").addEventListener("click",function(){
        playBiu();
        this.classList.add("hide");
    });

    function showToast(e,t){
        t=t||"success";var o=document.querySelector(".toast-message");if(o)o.remove();
        var n=document.createElement("div");n.className="toast-message "+t;n.textContent=e;document.body.appendChild(n);
        setTimeout(function(){if(n.parentNode)n.remove();},3000);
    }

    function renderGroupedStats(grouped, maxCount, minCount){
        if(!grouped||!grouped.length)return'<div class="no-data">无有效数据</div>';
        var html='';
        grouped.forEach(function(item){
            var count=parseInt(item[0]), items=item[1], groupClass='';
            if(count===maxCount)groupClass=' max-group';else if(count===minCount)groupClass=' min-group';
            html+='<div class="stats-group'+groupClass+'"><div class="group-header">🌸 '+count+'次</div><div class="group-items">';
            items.forEach(function(it){
                var cls='';if(count===maxCount)cls=' max-item';else if(count===minCount)cls=' min-item';
                html+='<span class="item-badge'+cls+'">'+it+'</span>';
            });
            html+='</div></div>';
        });
        return html;
    }

    function generateCopyText(grouped, input, modeName, timeStr){
        timeStr=timeStr||new Date().toLocaleString();
        var txt='咸鱼专属统计器 - 统计报告\n========================\n统计时间: '+timeStr+'\n统计模式: '+modeName+'\n统计数据: '+input+'\n------------------------\n\n';
        grouped.forEach(function(item){txt+=item[0]+'次: '+item[1].join('、')+'\n';});
        txt+='\n========================\nPowered by 咸鱼统计器';
        return txt;
    }

    function performStatistics(e,t){
        if(!e.trim())return null;var o={};
        if(t==="digitSplit"){
            var r=e.split(/[\s,，\n]+/).filter(function(x){return x;});if(!r.length)return null;
            r.forEach(function(x){x.toString().split("").forEach(function(ch){if(ch>="0"&&ch<="9")o[ch]=(o[ch]||0)+1;});});
        }else if(t==="digitWhole"){
            var r=e.split(/[\s,，\n]+/).filter(function(x){return x;});if(!r.length)return null;
            for(var i=1;i<=49;i++)o[String(i).padStart(2,"0")]=0;
            r.forEach(function(x){
                var d=x.replace(/[^\d]/g,"");if(d){
                    if(x.length===2&&/^\d{2}$/.test(x)){var n=parseInt(x,10);if(n>=1&&n<=49)o[x]=(o[x]||0)+1;}
                    else{for(var j=0;j<d.length-1;j+=2){var p=d.substr(j,2),v=parseInt(p,10);if(v>=1&&v<=49)o[p]=(o[p]||0)+1;}}
                }
            });
        }else if(t==="shengxiao"){
            var a=["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];a.forEach(function(x){o[x]=0;});
            var c=e.replace(/[\s,，\n]+/g,"");for(var k=0;k<c.length;k++){var ch=c[k];if(o.hasOwnProperty(ch))o[ch]++;}
        }
        var u={};Object.keys(o).forEach(function(k){var c=o[k];if(c>0){if(!u[c])u[c]=[];u[c].push(k);}});
        Object.keys(u).forEach(function(c){u[c].sort(function(a,b){var na=parseInt(a),nb=parseInt(b);return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb;});});
        if(Object.keys(u).length===0)return null;
        var counts=Object.keys(u).map(function(x){return parseInt(x);}).sort(function(a,b){return b-a;});
        var result=counts.map(function(c){return [c,u[c]];});result._maxCount=counts[0];result._minCount=counts[counts.length-1];return result;
    }

    function runStatistics(){
        playBiu();
        var text=document.getElementById("inputData").value,mode=document.getElementById("modeSelect").value;
        var grouped=performStatistics(text,mode);if(!grouped)return showToast("⚠️ 请输入有效数据","error");
        currentGrouped=grouped;currentMax=grouped._maxCount;currentMin=grouped._minCount;currentInput=text;currentMode=document.getElementById("modeSelect").selectedOptions[0].text;
        document.getElementById("result").innerHTML=renderGroupedStats(grouped,currentMax,currentMin);
        var total=0;grouped.forEach(function(x){total+=x[1].length;});showToast("✅ 统计完成！共 ");
        loadHistory();historyData.unshift({id:Date.now(),time:new Date().toLocaleString(),mode:currentMode,input:text,groupedData:JSON.parse(JSON.stringify(grouped))});
        if(historyData.length>20)historyData.length=20;saveHistory();
    }

    function copyTextToClipboard(text){
        if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){showToast("📋 已复制到剪贴板");}).catch(function(){oldCopy(text);});}
        else{oldCopy(text);}
    }
    function oldCopy(text){
        var t=document.createElement("textarea");t.value=text;t.style.position="fixed";t.style.left="-9999px";document.body.appendChild(t);t.focus();t.select();
        try{document.execCommand("copy");showToast("📋 已复制到剪贴板");}catch(e){showToast("⚠️ 复制失败","error");}document.body.removeChild(t);
    }

    function copyResult(){playBiu();if(!currentGrouped)return showToast("⚠️ 请先进行统计","error");copyTextToClipboard(generateCopyText(currentGrouped,currentInput,currentMode));}
    function clearCurrent(){
        playBiu();var input=document.getElementById("inputData"),had=input.value.trim()!=="";input.value="",document.getElementById("result").innerHTML='<div class="no-data">暂无数据</div>';
        currentGrouped=null;currentMax=null;currentMin=null;currentInput="";currentMode="";had?showToast("✅ 已清除所有内容"):showToast("❌ 没有清除的内容","error");
    }

    function showHistory(){
        playBiu();loadHistory();var list=document.getElementById("historyList");
        if(historyData.length===0){list.innerHTML='<div class="history-empty">暂无历史记录</div>';}
        else{
            var html='';historyData.forEach(function(item,i){
                html+='<div class="history-item"><div class="history-time">#'+(i+1)+' '+item.time+' | '+item.mode+'</div><div class="history-input">输入: '+item.input+'</div><button class="history-copy-btn" data-index="'+i+'">📋 复制</button>'+renderGroupedStats(item.groupedData,item.groupedData._maxCount,item.groupedData._minCount)+'</div>';
            });
            list.innerHTML=html;var btns=list.querySelectorAll('.history-copy-btn');
            for(var b=0;b<btns.length;b++){(function(idx){btns[idx].addEventListener('click',function(e){e.stopPropagation();playBiu();copyTextToClipboard(generateCopyText(historyData[idx].groupedData,historyData[idx].input,historyData[idx].mode,historyData[idx].time));});})(b);}
        }
        document.getElementById("historyModal").classList.add("show");
    }
    function hideHistory(){document.getElementById("historyModal").classList.remove("show");}
    function clearHistory(){
        playBiu();if(confirm("确定要清空所有历史记录吗？")){historyData=[];saveHistory();document.getElementById("historyList").innerHTML='<div class="history-empty">历史已清空</div>';showToast("🗑️ 历史已清空");}
    }

    document.getElementById("runBtn").addEventListener("click",runStatistics);
    document.getElementById("clearCurrentBtn").addEventListener("click",clearCurrent);
    document.getElementById("copyBtn").addEventListener("click",copyResult);
    document.getElementById("historyBtn").addEventListener("click",showHistory);
    document.getElementById("clearHistoryBtn").addEventListener("click",clearHistory);
    document.getElementById("historyModal").addEventListener("click",function(e){if(e.target===this)hideHistory();});
    loadHistory();
})();
</script>
</body>
</html>
