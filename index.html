<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>咸鱼统计器</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0a1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="咸鱼统计器">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#ffe4ec,#ffd6e0,#ffc8d6);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;overflow-x:hidden;color:#fff;}
body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(2px 2px at 20% 30%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 70% 20%,rgba(255,255,255,.4),transparent),radial-gradient(1.5px 1.5px at 50% 80%,rgba(255,255,255,.5),transparent),radial-gradient(2px 2px at 80% 60%,rgba(255,255,255,.3),transparent);animation:twinkle 5s infinite alternate;pointer-events:none;}
@keyframes twinkle{from{opacity:.6}to{opacity:1}}
.splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#ffd6e8,#ffc8d6);display:flex;flex-direction:column;justify-content:center;align-items:center;transition:.6s;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-title{font-size:42px;font-weight:900;letter-spacing:8px;background:linear-gradient(135deg,#ff6b8a,#ff4570);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 15px rgba(255,80,110,.5));animation:float 2s ease-in-out infinite;}
.splash-tip{margin-top:20px;opacity:.7;font-size:14px;animation:fade 1.5s infinite alternate;color:#888;}
@keyframes float{50%{transform:translateY(-8px)}}
@keyframes fade{from{opacity:.3}to{opacity:1}}
.container{width:100%;max-width:650px;background:rgba(30,15,30,0.75);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);border-radius:32px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.4);position:relative;z-index:2;}
h1{text-align:center;font-size:30px;margin-bottom:22px;background:linear-gradient(135deg,#ffb7c5,#ff69b4,#ff85a2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
textarea,select{width:100%;border:none;outline:none;border-radius:22px;padding:16px;font-size:16px;background:rgba(255,255,255,.08);color:#fff;margin-bottom:16px;border:1px solid rgba(255,255,255,.12);}
textarea{min-height:120px;resize:none;}
textarea::placeholder{color:rgba(255,255,255,.4);}
.button-panel{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
button{flex:1;min-width:100px;border:none;padding:14px;border-radius:18px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:.15s;}
button:active{transform:scale(.95);}
#runBtn{background:linear-gradient(135deg,#4ade80,#22c55e);box-shadow:0 8px 20px rgba(74,222,128,.35);}
#clearBtn{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 8px 20px rgba(239,68,68,.35);}
#copyBtn{background:linear-gradient(135deg,#facc15,#eab308);box-shadow:0 8px 20px rgba(250,204,21,.35);}
#historyBtn{background:linear-gradient(135deg,#b98cff,#9f70ff);box-shadow:0 8px 20px rgba(185,140,255,.35);}
.result-title{text-align:center;margin-bottom:10px;color:#ffb7c5;font-size:18px;}
#resultWrapper{border-radius:24px;overflow:hidden;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);}
.stats-group{margin:10px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.04);position:relative;}
.group-header{padding:12px 55px 12px 16px;font-weight:700;background:linear-gradient(135deg,rgba(255,105,180,.45),rgba(255,105,180,.15));position:relative;}
.group-copy-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:5px 10px;border-radius:12px;background:rgba(137,194,255,.25);border:1px solid rgba(137,194,255,.35);color:#89c2ff;font-size:10px;cursor:pointer;white-space:nowrap;}
.group-copy-btn:active{background:rgba(137,194,255,.5);}
.group-items{padding:12px;display:flex;flex-wrap:wrap;gap:8px;}
.item{padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-weight:600;}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(255,105,180,.95);padding:14px 26px;border-radius:999px;font-weight:700;z-index:99999;animation:toast .3s ease;box-shadow:0 10px 30px rgba(255,105,180,.4);}
@keyframes toast{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:999;}
.modal.show{display:flex;}
.modal-box{width:92%;max-width:650px;max-height:80vh;overflow:auto;background:#241326;border-radius:26px;padding:22px;border:1px solid rgba(255,255,255,.1);}
.modal-title{text-align:center;margin-bottom:18px;font-size:22px;color:#ffb7c5;}
.history-item{padding:14px;margin-bottom:12px;border-radius:18px;background:rgba(255,255,255,.05);}
.history-time{font-size:12px;opacity:.7;margin-bottom:8px;}
.history-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:8px 12px;border-radius:12px;background:rgba(255,255,255,.04);}
.history-row-text{flex:1;font-size:14px;}
.history-row-btn{padding:4px 10px;border-radius:10px;background:rgba(137,194,255,.2);border:1px solid rgba(137,194,255,.3);color:#89c2ff;font-size:10px;cursor:pointer;white-space:nowrap;margin-left:8px;}
.history-row-btn:active{background:rgba(137,194,255,.4);}
.clear-history{margin-top:12px;background:linear-gradient(135deg,#ff4d6d,#ff6b6b);}
</style>
</head>
<body>

<div class="splash" id="splash">
<div class="splash-title">你好，咸鱼</div>
<div class="splash-tip">点击任意位置进入</div>
</div>

<div class="container">
<h1>🫧 咸鱼统计器 </h1>
<textarea id="inputData" placeholder="请先选择统计类型"></textarea>
<select id="modeSelect">
<option value="digitSplit">头尾统计</option>
<option value="digitWhole">号码统计</option>
<option value="shengxiao">生肖统计</option>
</select>
<div class="button-panel">
<button id="runBtn">开始统计</button>
<button id="clearBtn">删除统计</button>
<button id="copyBtn">复制统计</button>
<button id="historyBtn">📜 历史记录</button>
</div>
<div class="result-title">📊 当前统计结果</div>
<div id="resultWrapper">
<div id="result" style="padding:20px;text-align:center;color:#aaa;">暂无数据</div>
</div>
</div>

<div class="modal" id="historyModal">
<div class="modal-box">
<div class="modal-title">📜 历史记录</div>
<div id="historyList"></div>
<button id="clearHistoryBtn" class="clear-history">🗑️ 清空历史</button>
</div>
</div>

<script>
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js");}

document.getElementById("splash").onclick=function(){
    this.classList.add("hide");
};

function toast(text){var t=document.createElement("div");t.className="toast";t.innerText=text;document.body.appendChild(t);setTimeout(function(){t.remove();},2200);}

var ac;
function biu(){try{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=900;g.gain.value=.1;o.start();g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);o.stop(ac.currentTime+.15);}catch(e){}}

function getHistory(){try{return JSON.parse(localStorage.getItem("xy_history")||"[]");}catch(e){return[];}}
function saveHistory(arr){localStorage.setItem("xy_history",JSON.stringify(arr));}

function copyText(text){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){toast("📋 已复制");});}else{var t=document.createElement("textarea");t.value=text;t.style.position="fixed";t.style.left="-9999px";document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);toast("📋 已复制");}}

function stats(text,mode){
if(!text.trim())return null;
var map={};
if(mode==="digitSplit"){text.replace(/[^\d]/g,"").split("").forEach(function(n){map[n]=(map[n]||0)+1;});}
else if(mode==="digitWhole"){for(var i=1;i<=49;i++)map[String(i).padStart(2,"0")]=0;var nums=text.replace(/[^\d]/g,"");for(var i=0;i<nums.length-1;i+=2){var n=nums.substr(i,2),v=parseInt(n);if(v>=1&&v<=49)map[n]=(map[n]||0)+1;}}
else{var animals=["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];animals.forEach(function(a){map[a]=0;});text.split("").forEach(function(ch){if(map.hasOwnProperty(ch))map[ch]++;});}
var group={};Object.keys(map).forEach(function(k){var c=map[k];if(c>0){if(!group[c])group[c]=[];group[c].push(k);}});
return Object.keys(group).sort(function(a,b){return b-a;}).map(function(c){return[c,group[c]];});
}

function render(data){
if(!data||!data.length){document.getElementById("result").innerHTML='<div style="padding:20px;color:#aaa;">暂无数据</div>';return;}
var html="";data.forEach(function(item,idx){
html+='<div class="stats-group"><div class="group-header">✨  '+item[0]+'次<button class="group-copy-btn" data-idx="'+idx+'">复制</button></div><div class="group-items">';
item[1].forEach(function(i){html+='<div class="item">'+i+'</div>';});
html+='</div></div>';
});
document.getElementById("result").innerHTML=html;
document.querySelectorAll('.group-copy-btn').forEach(function(btn){btn.onclick=function(e){e.stopPropagation();biu();var d=data[parseInt(this.getAttribute('data-idx'))];copyText(d[1].join('、'));};});
}

var currentData=null;

document.getElementById("runBtn").onclick=function(){
biu();var text=document.getElementById("inputData").value,mode=document.getElementById("modeSelect").value;
var data=stats(text,mode);if(!data){toast("⚠️ 请输入有效内容");return;}
currentData=data;render(data);toast("✅ 统计完成");
var history=getHistory();history.unshift({time:new Date().toLocaleString(),text:text,mode:mode,data:data});
if(history.length>20)history.length=20;saveHistory(history);
};

document.getElementById("clearBtn").onclick=function(){biu();document.getElementById("inputData").value="";document.getElementById("result").innerHTML='<div style="padding:20px;color:#aaa;">暂无数据</div>';currentData=null;toast("✅ 已清除");};

document.getElementById("copyBtn").onclick=function(){biu();if(!currentData){toast("⚠️ 没有可复制内容");return;}var t="咸鱼统计结果\n\n";currentData.forEach(function(i){t+=i[0]+'次：'+i[1].join('、')+'\n';});copyText(t);};

document.getElementById("historyBtn").onclick=function(){
biu();var modal=document.getElementById("historyModal"),list=document.getElementById("historyList"),history=getHistory();
if(!history.length){list.innerHTML='<div style="text-align:center;color:#aaa;">暂无历史记录</div>';}
else{
var html="";history.forEach(function(h,i){
html+='<div class="history-item"><div class="history-time">#'+(i+1)+' '+h.time+'</div><div style="margin-bottom:8px;opacity:.8;">输入：'+h.text+'</div>';
h.data.forEach(function(d,j){
html+='<div class="history-row"><span class="history-row-text">✨ '+d[0]+'次：'+d[1].join('、')+'</span><button class="history-row-btn" data-hidx="'+i+'" data-didx="'+j+'">复制</button></div>';
});
html+='</div>';
});
list.innerHTML=html;
list.querySelectorAll('.history-row-btn').forEach(function(btn){btn.onclick=function(e){e.stopPropagation();biu();var h=history[parseInt(this.getAttribute('data-hidx'))];var d=h.data[parseInt(this.getAttribute('data-didx'))];copyText(d[1].join('、'));};});
}
modal.classList.add("show");
};

document.getElementById("historyModal").onclick=function(e){if(e.target===this)this.classList.remove("show");};
document.getElementById("clearHistoryBtn").onclick=function(){biu();localStorage.removeItem("xy_history");document.getElementById("historyList").innerHTML='<div style="text-align:center;color:#aaa;">历史已清空</div>';toast("🗑️ 已清空历史");};
</script>
</body>
</html>
